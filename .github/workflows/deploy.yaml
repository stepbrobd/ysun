name: Deploy

on:
  push:
  workflow_dispatch:

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=https://github.com/nixos/nixpkgs/archive/refs/heads/nixos-unstable.tar.gz
          extra_nix_config: |
            trusted-public-keys = cache.ysun.co-1:WxPYwT5g3kt9XhUhHPpNLZKI9HIOsVVAuqSHpok8Qt4= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.ysun.co https://cache.nixos.org/
      - name: Build
        run: nix build -L
      - name: Node
        if: github.ref == 'refs/heads/master'
        uses: actions/setup-node@v7
        with:
          node-version: latest
      - name: Deploy
        if: github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          preCommands: |
            npm install wrangler@latest
          command: deploy --assets ./result/var/www/html/
